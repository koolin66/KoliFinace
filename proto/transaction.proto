syntax = "proto3";

package transaction;
option go_package = "KolinFinance/gen/transaction";

service TransactionService {
    rpc Add(AddRequest) returns (AddResponse);
    rpc GetByID(GetByIDRequest) returns (GetByIDResponse);
    rpc Delete(DeleteRequest) returns (DeleteResponse);
}

message AddRequest {
    string type = 1;
    int64  amount = 2;
    string category = 3;
    string note = 4;
}

message AddResponse {
    int64  id = 1;
    string type = 2;
    int64  amount = 3;
    string category = 4;
}

message GetByIDRequest {
    int64 id = 1;
}

message GetByIDResponse {
    int64  id = 1;
    string type = 2;
    int64  amount = 3;
    string category = 4;
}

message DeleteRequest {
    int64 id = 1;
}

message DeleteResponse {}